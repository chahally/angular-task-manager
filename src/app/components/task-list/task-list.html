<h2>Tasks</h2>

<!--
*ngFor loops through the list of tasks and renders each one
-->
<ul>

  <li *ngFor="let task of tasks">

    <!--
    Checkbox reflects whether the task is completed.
    When changed, it toggles the task state.
    -->
    <input
      type="checkbox"
      [checked]="task.completed"
      (change)="toggleTask(task.id)"
    />

    {{ task.title }}

    <!--
    Button that removes the task from the list
    -->
    <button (click)="deleteTask(task.id)">
      Delete
    </button>

  </li>

</ul>
