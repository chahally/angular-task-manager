<!-- Add Task Component -->
<div class="add-task-container">
  <h2>Add Task</h2>
  
  <div class="input-wrapper">
    <!-- Input bound to title -->
    <input
      type="text"
      [(ngModel)]="title"
      placeholder="Enter a new task"
    />

    <!-- Button with plus icon -->
    <button (click)="addTask()">
      <span class="plus-icon">+</span> Add Task
    </button>
  </div>
</div>
